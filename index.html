<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>블루아카 한섭 일정</title>
  <style>
    :root {
      --border:    #c8d3e0;
      --border-lt: #e2eaf3;
      --muted:     #94a3b8;
      --text:      #1e293b;
      --day-h:     20px;

      --c-story:  #0f766e;
      --c-event:  #2563eb;
      --c-pickup: #6b7280;
      --c-raid:   #b45309;
      --c-uc:     #7c3aed;
      --c-camp:   #15803d;

      --bg-story:  #f0fdfa;
      --bg-event:  #e8f0fe;
      --bg-pickup: #f3f4f6;
      --bg-raid:   #fef9c3;
      --bg-uc:     #ede9fe;
      --bg-camp:   #dcfce7;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #dde3ec; }

    .page {
      max-width: 640px;
      margin: 0 auto;
      height: 100dvh;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #fff;
      box-shadow: 0 0 24px rgba(0,0,0,0.12);
    }

    header {
      flex-shrink: 0;
      height: 46px;
      padding: 0 0.9rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      background: #fff;
    }
    header h1 { font-size: 1.05rem; font-weight: 700; }
    .btn {
      font-size: 0.8rem; font-weight: 700;
      padding: 0.27rem 0.75rem;
      border-radius: 9999px;
      border: none; cursor: pointer;
      background: var(--c-event); color: #fff;
    }

    .cal {
      flex: 1;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
    }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--muted);
      font-size: 0.85rem;
    }

    .sched {
      display: grid;
      grid-template-columns: 44px 60px 1fr 1fr 1fr 40px 6rem minmax(110px, 1fr);
      min-width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: var(--text);
    }

    .ch {
      position: sticky; top: 0; z-index: 200;
      padding: 0.42rem 0.3rem;
      font-size: 0.75rem; font-weight: 800; letter-spacing: 0.07em;
      text-align: center; white-space: nowrap;
      border-bottom: 2.5px solid transparent;
    }
    .ch-date   { background: #edf1f7; border-bottom-color: var(--border); }
    .ch-story  { background: #ccfbf1; color: var(--c-story);  border-bottom-color: var(--c-story);  }
    .ch-event  { background: #dbeafe; color: var(--c-event);  border-bottom-color: var(--c-event);  }
    .ch-pickup { background: #fce7f3; color: var(--c-pickup); border-bottom-color: var(--c-pickup); }
    .ch-raid   { background: #fef9c3; color: var(--c-raid);   border-bottom-color: var(--c-raid);   }
    .ch-camp   { background: #dcfce7; color: var(--c-camp);   border-bottom-color: var(--c-camp);   }

    .dc {
      grid-column: 1;
      border-right: 1.5px solid var(--border);
      position: sticky; left: 0; z-index: 60;
      background:
        repeating-linear-gradient(
          to bottom,
          transparent           0px,
          transparent           calc(var(--day-h) - 1px),
          var(--border-lt)      calc(var(--day-h) - 1px),
          var(--border-lt)      var(--day-h)
        ),
        #f4f7fb;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 5px;
      gap: 1px;
      overflow: hidden;
    }
    .dc.dc-past { opacity: 0.45; }

    .dc-m  { font-size: 0.8rem; color: var(--muted); line-height: 1; font-weight: 700; }
    .dc-d  { font-size: 0.8rem; color: var(--text);  line-height: 1; font-weight: 800; }
    .dc-dw { font-size: 0.6rem; color: var(--muted); line-height: 1; }

    .today-line {
      grid-column: 1 / -1;
      border-top: 2.5px solid var(--c-event);
      position: relative; z-index: 150;
      pointer-events: none;
    }
    .today-line::before {
      content: '';
      position: absolute;
      left: 38px;
      transform: translateX(-50%);
      top: -7px;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: var(--c-event);
    }

    .box {
      margin: 2px 3px;
      border-radius: 0.45rem;
      padding: 0.35rem 0.45rem;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 0.18rem;
      position: relative; z-index: 20;
    }
    .box.is-past { opacity: 0.3; }

    .box-event  { background: var(--bg-event);  border: 1.5px solid #93c5fd; border-left: 4px solid var(--c-event);  }
    .box-pickup { background: var(--bg-pickup); border: 1.5px solid #d1d5db; border-left: 4px solid var(--c-pickup); }
    .box-pickup.is-limited { background: #fee2e2; border-color: #fca5a5; border-left-color: #dc2626; }
    .box-pickup.is-fes     { background: #dcfce7; border-color: #86efac; border-left-color: #16a34a; }
    .char-limited { color: #991b1b; background: #fee2e2; border-color: #fca5a5; }
    .char-fes     { color: #166534; background: #dcfce7; border-color: #86efac; }
    .pickup-sep   { border-top: 1.5px dashed rgba(0,0,0,0.18); margin: 0.2rem 0; }
    .box-kind-inner {
      font-size: 0.72rem; font-weight: 800;
      text-align: center;
      background: rgba(0,0,0,0.12);
      margin: 0.18rem -0.45rem;
      padding: 0.15rem 0.45rem;
    }
    .char.char-rerun { background: transparent; border: none; color: rgba(0,0,0,0.4); }
    .char.char-rerun.char-limited { color: #991b1b; }
    .char.char-rerun.char-fes     { color: #166534; }
    .box-pickup.is-rerun-only { background: #f9fafb; border-color: #e5e7eb; border-left-color: #9ca3af; }
    .box-raid   { background: var(--bg-raid);   border: 1.5px solid #fde047; border-left: 4px solid var(--c-raid);   }
    .box-uc     { background: var(--bg-uc);     border: 1.5px solid #c4b5fd; border-left: 4px solid var(--c-uc);     }
    .box-uc .box-kind  { writing-mode: vertical-rl; text-orientation: sideways; margin: -0.35rem -0.45rem 0; padding: 0.2rem 0.15rem; border-radius: 0.45rem 0.45rem 0 0; display: flex; align-items: center; justify-content: center; }
    .box-uc .box-title { writing-mode: vertical-rl; text-orientation: sideways; align-self: center; margin: 0 auto; }
    .box-uc .box-chars { flex-direction: column; align-items: center; }
    .box-uc .char      { writing-mode: vertical-rl; text-orientation: sideways; display: flex; align-items: center; justify-content: center; padding: 0.32rem 0.1rem; }
    .box-uc .box-dur   { writing-mode: vertical-rl; text-orientation: sideways; margin-top: auto; margin-left: auto; margin-right: auto; border-top: 1px dashed rgba(0,0,0,0.1); padding-top: 0.14rem; }
    .box-story  { background: var(--bg-story);  border: 1.5px solid #5eead4; border-left: 4px solid var(--c-story); overflow: visible; }
    .box-story .box-title { writing-mode: vertical-rl; text-orientation: sideways; align-self: center; margin: 0 auto; }
    .box-story .box-dur   { writing-mode: vertical-rl; text-orientation: sideways; margin-top: auto; margin-left: auto; margin-right: auto; border-top: 1px dashed rgba(0,0,0,0.1); padding-top: 0.14rem; }
    .box-camp   { background: var(--bg-camp);   border: 1.5px solid #86efac; border-left: 4px solid var(--c-camp);   }
    .box-exp    { background: #f0f9ff; border: 1.5px solid #bae6fd; padding: 0.15rem 0.06rem; }
    .box-exp .box-title { writing-mode: vertical-rl; text-orientation: sideways; align-self: center; margin: 0 auto; font-size: 0.6rem; }

    .box-kind {
      font-size: 0.72rem; font-weight: 800;
      text-align: center;
      background: rgba(0,0,0,0.12);
      margin: -0.35rem -0.45rem 0;
      padding: 0.15rem 0.45rem;
      border-radius: 0.45rem 0.45rem 0 0;
    }
    .box-title {
      font-size: 0.82rem; font-weight: 700; line-height: 1.3; color: var(--text);
    }
    .box-chars { display: flex; flex-wrap: wrap; gap: 0.18rem; }
    .box-chars-rerun { row-gap: 0.06rem; }
    .char {
      font-size: 0.72rem; font-weight: 600;
      padding: 0.1rem 0.32rem;
      border-radius: 0.2rem;
      background: rgba(255,255,255,0.8);
      border: 1px solid rgba(0,0,0,0.08);
      white-space: nowrap;
    }
    .box-dur {
      margin-top: auto; padding-top: 0.14rem;
      font-size: 0.62rem; color: var(--muted); font-weight: 700;
      border-top: 1px dashed rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>
<div class="page">
  <header>
    <h1>블루아카 한섭 일정</h1>
    <button class="btn" id="btnToday">▲ 오늘로</button>
  </header>
  <div class="cal" id="cal">
    <div class="loading" id="loading">로딩 중…</div>
    <div class="sched" id="sched" style="display:none"></div>
  </div>
</div>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRE_g5vT44r3MXOoMdD_4MjeT0tf4luvbt_7AGUHx4cS0cx0aWFFAYlUiRAx5oAUB_gtFst5Ncy8pkc/pub?output=csv';

const DAY_H = 20;
const DAYS  = ['일','월','화','수','목','금','토'];
const HDR   = 1;

const EVENT_TYPES = new Set(['신규','복각','상설']);

const COL_MAP = {
  '이벤트':       'event',
  '메인스토리':   'story',
  '픽업':         'pickup',
  '총력전':       'raid',
  '대결전':       'raid',
  '종합전술시험': 'raid',
  '제약해제결전': 'uc',
  '캠페인':       'camp',
  '업데이트':     'update',
};

const COL_NUM = { story: 2, event: 3, pickup: 4, raid: 5, uc: 6, camp: 7, exp: 7, update: 8 };
const BOX_CLS = { story: 'box-story', event: 'box-event', pickup: 'box-pickup', raid: 'box-raid', uc: 'box-uc', camp: 'box-camp', exp: 'box-exp', update: 'box-event' };

const ARMOR_COLORS = {
  '경':     { bg: '#fee2e2', border: '#fca5a5', accent: '#ef4444' },
  '중':     { bg: '#fef9c3', border: '#fde047', accent: '#b45309' },
  '특':     { bg: '#e0f2fe', border: '#7dd3fc', accent: '#0284c7' },
  '탄':     { bg: '#fdf2f8', border: '#f0abfc', accent: '#c026d3' },
  '경장갑': { bg: '#fee2e2', border: '#fca5a5', accent: '#ef4444' },
  '중장갑': { bg: '#fef9c3', border: '#fde047', accent: '#b45309' },
  '특수장갑':{ bg: '#e0f2fe', border: '#7dd3fc', accent: '#0284c7' },
  '탄력장갑':{ bg: '#fdf2f8', border: '#f0abfc', accent: '#c026d3' },
};

// ── Date utilities ────────────────────────────────────────────────────────────

const MIN_DATE = new Date(2021, 0, 1);

function pd(s) {
  if (!s) return null;
  s = String(s).trim().replace(/﻿/g, '');
  if (!s) return null;
  let m, d, y, result;
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) {
    [y,m,d] = s.split('-').map(Number);
    result = new Date(y, m-1, d);
  } else if (/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(s)) {
    [m,d,y] = s.split('/').map(Number);
    result = new Date(y, m-1, d);
  } else if (/^\d{4}\/\d{1,2}\/\d{1,2}$/.test(s)) {
    [y,m,d] = s.split('/').map(Number);
    result = new Date(y, m-1, d);
  } else {
    const koMatch = s.match(/^(\d{4})\.\s*(\d{1,2})\.\s*(\d{1,2})\.?\s*(?:\([^)]*\))?$/);
    if (koMatch) {
      [, y, m, d] = koMatch.map(Number);
      result = new Date(y, m-1, d);
    } else if (/^\d{1,2}\/\d{1,2}$/.test(s)) {
      [m,d] = s.split('/').map(Number);
      y = new Date().getFullYear();
      const t = new Date(y, m-1, d);
      if (t < addD(new Date(), -180)) y++;
      result = new Date(y, m-1, d);
    } else {
      const koDay = s.match(/^(\d{1,2})월\s*(\d{1,2})일/);
      if (koDay) {
        [, m, d] = koDay.map(Number);
        y = new Date().getFullYear();
        const t = new Date(y, m-1, d);
        if (t < addD(new Date(), -180)) y++;
        result = new Date(y, m-1, d);
      }
    }
  }
  if (!result || result < MIN_DATE) return null;
  return result;
}

function addD(d, n)  { const r = new Date(d); r.setDate(r.getDate()+n); return r; }
function diffD(a, b) { return Math.round((a - b) / 86400000); }
function today0()    { const d = new Date(); d.setHours(0,0,0,0); return d; }

// ── CSV parsing ───────────────────────────────────────────────────────────────

function parseCSVLine(line) {
  const res = [];
  let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { inQ = !inQ; continue; }
    if (c === ',' && !inQ) { res.push(cur); cur = ''; continue; }
    cur += c;
  }
  res.push(cur);
  return res;
}

async function loadRows() {
  const noCache = new URLSearchParams(location.search).has('nocache');
  const url = noCache ? `${CSV_URL}&_t=${Date.now()}` : CSV_URL;
  const res = await fetch(url, noCache ? { cache: 'no-store' } : {});
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const text = await res.text();
  const clean = text.replace(/^﻿/, '');
  const lines = clean.split('\n').filter(l => l.trim());
  if (lines.length < 2) return [];
  const headers = parseCSVLine(lines[0]).map(h => h.trim().replace(/^﻿/, ''));
  return lines.slice(1)
    .map(line => {
      const vals = parseCSVLine(line);
      const row = {};
      headers.forEach((h, i) => row[h] = (vals[i] || '').trim());
      return row;
    })
    .filter(r => r['종류'] && pd(r['한섭시작일자']));
}

// ── Group same-range pickups into one box ─────────────────────────────────────

function groupPickups(rows) {
  const out  = [];
  const seen = {};
  rows.forEach(row => {
    if (row['종류'] !== '픽업') { out.push(row); return; }
    const key = `${row['한섭시작일자']}|${row['한섭종료일자']}`;
    const type3 = row['속성3'] || '';
    const type4 = row['속성4'] || '';
    const chars = [row['속성1'], row['속성2']].filter(Boolean)
                    .map(c => ({ name: c, type: type3, rerun: type4 }));
    if (seen[key]) {
      chars.forEach(c => { if (!seen[key]._chars.find(x => x.name === c.name)) seen[key]._chars.push(c); });
      if (type3 && !seen[key]._type) seen[key]._type = type3;
      if (type4 && !seen[key]._rerun) seen[key]._rerun = type4;
    } else {
      const g = { ...row, _chars: chars, _type: type3, _rerun: type4 };
      seen[key] = g;
      out.push(g);
    }
  });
  return out;
}

// ── Tooltip ───────────────────────────────────────────────────────────────────

function buildTooltip(row) {
  const kind = row['종류'];
  const a1 = row['속성1'] || '', a2 = row['속성2'] || '';
  const a3 = row['속성3'] || '', a4 = row['속성4'] || '', a5 = row['속성5'] || '';

  let summary = '';
  if (kind === '픽업') {
    const chars = (row._chars || []).map(c => c.name).filter(Boolean);
    summary = chars.length ? chars.join(', ') : a1;
  } else if (kind === '캠페인') {
    summary = [a1, a2, a3, a4].filter(Boolean).join(' · ');
  } else if (kind === '이벤트' || kind === '메인스토리') {
    summary = a1;
  } else {
    const detail = [a1, a2, a3 && a4 ? `${a3}/${a4}` : a3, a5].filter(Boolean).join(' · ');
    summary = [kind, detail].filter(Boolean).join(' ');
  }

  const fmt = s => s ? s.replace(/-/g, '/') : null;
  const jpS = fmt(row['일섭시작일자']), jpE = fmt(row['일섭종료일자']);
  const krS = fmt(row['한섭시작일자']), krE = fmt(row['한섭종료일자']);
  const lines = [];
  if (summary) lines.push(summary);
  if (jpS) lines.push(`JP: ${jpS}~${jpE || '?'}`);
  if (krS) lines.push(`KR: ${krS}~${krE || '?'}`);
  return lines.join('\n');
}

// ── Box content ───────────────────────────────────────────────────────────────

function chip(text) {
  const s = document.createElement('span');
  s.className = 'char';
  s.textContent = text;
  return s;
}

function chipsRow(texts) {
  const wrap = document.createElement('div');
  wrap.className = 'box-chars';
  texts.forEach(t => wrap.appendChild(chip(t)));
  return wrap;
}

function buildBoxContent(row) {
  const kind = row['종류'];
  const a1 = row['속성1'] || '';
  const a2 = row['속성2'] || '';
  const a3 = row['속성3'] || '';
  const a4 = row['속성4'] || '';
  const a5 = row['속성5'] || '';
  const frag = document.createDocumentFragment();

  const mkTitle = (text, style) => {
    const el = document.createElement('div');
    el.className = 'box-title';
    if (style) el.style.cssText = style;
    el.textContent = text;
    return el;
  };

  const mkKind = () => {
    const el = document.createElement('div');
    el.className = 'box-kind';
    el.textContent = kind;
    return el;
  };

  if (kind === '픽업') {
    const chars = row._chars || [{ name: a1, type: '', rerun: '' }];
    const newChars    = chars.filter(c => !c.rerun);
    const rerunChars  = chars.filter(c =>  c.rerun);
    const makeChips = (list, extraClass) => {
      const wrap = document.createElement('div');
      wrap.className = extraClass === 'char-rerun' ? 'box-chars box-chars-rerun' : 'box-chars';
      list.forEach(c => {
        const el = chip(c.name || c);
        const t = c.type || '';
        if (t === '한정') el.classList.add('char-limited');
        else if (t === '페스') el.classList.add('char-fes');
        if (extraClass) el.classList.add(extraClass);
        wrap.appendChild(el);
      });
      return wrap;
    };
    const typeOrder = ['한정', '페스', ''];
    let isFirst = true;
    if (newChars.length) {
      const groups = {};
      newChars.forEach(c => { (groups[c.type||''] ??= []).push(c); });
      typeOrder.filter(t => groups[t]).forEach(t => {
        if (t) {
          const label = document.createElement('div');
          label.className = isFirst ? 'box-kind' : 'box-kind-inner';
          label.textContent = t;
          frag.appendChild(label);
        }
        frag.appendChild(makeChips(groups[t]));
        isFirst = false;
      });
    }
    if (rerunChars.length) {
      if (newChars.length) {
        const sep = document.createElement('div');
        sep.className = 'pickup-sep';
        frag.appendChild(sep);
      }
      const sortedRerun = typeOrder.flatMap(t => rerunChars.filter(c => (c.type||'') === t));
      frag.appendChild(makeChips(sortedRerun, 'char-rerun'));
    }
    return frag;
  }

  if (kind === '이벤트') {
    frag.appendChild(mkTitle(a1));
    if (EVENT_TYPES.has(a2)) frag.appendChild(chip(a2));
    const charStr = EVENT_TYPES.has(a2) ? a3 : [a2, a3].filter(Boolean).join(', ');
    if (charStr) frag.appendChild(chipsRow(charStr.split(',').map(c => c.trim()).filter(Boolean)));
    return frag;
  }

  if (kind === '메인스토리') {
    const el = document.createElement('div');
    el.className = 'box-title';
    const match = a1.match(/^(.*\d+장)([\s\S]*)$/);
    if (match && match[2].trim()) {
      el.appendChild(document.createTextNode(match[1]));
      el.appendChild(document.createElement('br'));
      el.appendChild(document.createTextNode(match[2].trim()));
    } else {
      el.textContent = a1;
    }
    frag.appendChild(el);
    return frag;
  }

  if (kind === '총력전') {
    frag.appendChild(mkKind());
    frag.appendChild(mkTitle(a1));
    const chips = [a2, a5].filter(Boolean);
    if (chips.length) frag.appendChild(chipsRow(chips));
    return frag;
  }

  if (kind === '제약해제결전') {
    frag.appendChild(mkKind());
    frag.appendChild(mkTitle(a1));
    if (a2) frag.appendChild(chipsRow([a2]));
    return frag;
  }

  if (kind === '대결전') {
    frag.appendChild(mkKind());
    frag.appendChild(mkTitle(a1));
    const chips = [a2].filter(Boolean);
    if (a3 && a4) chips.push(`${a3} / ${a4}`);
    else if (a3) chips.push(a3);
    if (a5) chips.push(a5);
    if (chips.length) frag.appendChild(chipsRow(chips));
    return frag;
  }

  if (kind === '종합전술시험') {
    frag.appendChild(mkKind());
    frag.appendChild(mkTitle(a1));
    return frag;
  }

  if (kind === '캠페인') {
    if (a1 === '경험치' && !a2) {
      frag.appendChild(mkTitle(a1));
      return frag;
    }
    if (a1) frag.appendChild(mkTitle(a1));
    if (a2) frag.appendChild(mkTitle(a2));
    return frag;
  }

  frag.appendChild(mkTitle(a1));
  return frag;
}

// ── Render ────────────────────────────────────────────────────────────────────

function render(rows) {
  const sched = document.getElementById('sched');
  sched.innerHTML = '';

  const entries = groupPickups(rows);
  const todayDate = today0();

  const starts = entries.map(r => pd(r['한섭시작일자'])).filter(Boolean);
  const ends   = entries.map(r => pd(r['한섭종료일자'])).filter(Boolean);
  const gridStart = addD(new Date(Math.min(...starts, ...ends)), -3);
  const viewportDays = Math.ceil(document.getElementById('cal').clientHeight / DAY_H);
  let gridEnd = addD(new Date(Math.max(...starts, ...ends)), 7);
  const minEnd = addD(todayDate, viewportDays + 7);
  if (gridEnd < minEnd) gridEnd = minEnd;
  const totalDays = diffD(gridEnd, gridStart) + 1;

  sched.style.gridAutoRows = `${DAY_H}px`;

  const toRow = d => {
    if (!d) return null;
    return diffD(typeof d === 'string' ? pd(d) : d, gridStart) + HDR + 1;
  };

  // Column headers
  [
    { col: 1,     cls: 'ch ch-date',   t: ''         },
    { col: 2,     cls: 'ch ch-story',  t: '스토리'   },
    { col: 3,     cls: 'ch ch-event',  t: '이벤트'   },
    { col: 4,     cls: 'ch ch-pickup', t: '픽업'     },
    { col: '5/7', cls: 'ch ch-raid',   t: '총력전'   },
    { col: 7,     cls: 'ch ch-camp',   t: '캠페인'   },
    { col: 8,     cls: 'ch ch-date',   t: '업데이트' },
  ].forEach(({ col, cls, t }) => {
    const el = document.createElement('div');
    el.className = cls;
    el.textContent = t;
    el.style.cssText = `grid-column:${col};grid-row:${HDR};`;
    sched.appendChild(el);
  });

  // Date column: weekly markers on Tuesdays
  let wk = addD(new Date(gridStart), -((gridStart.getDay() - 2 + 7) % 7));
  while (wk <= gridEnd) {
    const next = addD(wk, 7);
    const el = document.createElement('div');
    el.className = 'dc' + (next <= todayDate ? ' dc-past' : '');
    el.style.cssText = `grid-row:${toRow(wk)}/${Math.min(toRow(next), totalDays + HDR + 1)};`;
    el.innerHTML = `<span class="dc-m">${wk.getMonth()+1}월</span><span class="dc-d">${wk.getDate()}</span><span class="dc-dw">${DAYS[wk.getDay()]}</span>`;
    sched.appendChild(el);
    wk = next;
  }

  // Today marker
  const todayRow = toRow(todayDate);
  if (todayRow >= HDR + 1 && todayRow <= totalDays + HDR + 1) {
    const tl = document.createElement('div');
    tl.id = '_today';
    tl.className = 'today-line';
    tl.style.cssText = `grid-row:${todayRow};`;
    sched.appendChild(tl);
  }

  // Pre-compute which camp cards need offset (overlap detection)
  const campRows = entries.filter(r =>
    r['종류'] === '캠페인' && !((r['속성1']||'') === '경험치' && !(r['속성2']||'').trim())
  );
  const shiftedCamp = new Set();
  for (let i = 0; i < campRows.length; i++) {
    for (let j = i + 1; j < campRows.length; j++) {
      const [a, b] = [campRows[i], campRows[j]];
      const as = pd(a['한섭시작일자']), ae = pd(a['한섭종료일자']);
      const bs = pd(b['한섭시작일자']), be = pd(b['한섭종료일자']);
      if (!as || !ae || !bs || !be) continue;
      if (as < be && bs < ae && as.getTime() !== bs.getTime())
        shiftedCamp.add(bs > as ? b : a);
    }
  }

  // Content boxes
  entries.forEach(row => {
    const kind    = row['종류'];
    const isPerma = kind === '이벤트' && row['속성2'] === '상설';
    const isExp   = kind === '캠페인' && (row['속성1'] || '') === '경험치' && !(row['속성2'] || '').trim();
    const colKey  = isPerma ? 'update' : (isExp ? 'exp' : COL_MAP[kind]);
    if (!colKey) return;

    const startDate = pd(row['한섭시작일자']);

    let endDate = pd(row['한섭종료일자']);
    if (!endDate) {
      if (kind === '메인스토리') {
        const textLen = (row['속성1'] || '').length;
        const neededDays = Math.ceil((13 * textLen + 16) / (0.6 * DAY_H));
        endDate = addD(startDate, Math.max(7, neededDays));
      }
      else {
        const shortPin = new Set(['업데이트']);
        endDate = (shortPin.has(kind) || isPerma) ? addD(startDate, 3) : addD(gridEnd, 1);
      }
    }

    const r0 = toRow(startDate);
    const r1 = toRow(endDate);
    if (!r0 || r0 >= r1) return;

    const dur    = diffD(endDate, startDate);
    const isPast = endDate <= todayDate;

    const el = document.createElement('div');
    let cls = `box ${BOX_CLS[colKey]}` + (isPast ? ' is-past' : '');
    if (kind === '픽업') {
      const chars    = row._chars || [];
      const hasNew   = chars.some(c => !c.rerun);
      const hasRerun = chars.some(c =>  c.rerun);
      if (!hasNew && hasRerun) {
        cls += ' is-rerun-only';
      } else if (hasNew) {
        const newTypes = chars.filter(c => !c.rerun).map(c => c.type);
        if (newTypes.includes('페스'))      cls += ' is-fes';
        else if (newTypes.includes('한정')) cls += ' is-limited';
      }
    }
    el.className = cls;
    el.title = buildTooltip(row);
    el.style.cssText = `grid-column:${COL_NUM[colKey]};grid-row:${r0}/${r1};`;
    if (colKey === 'update') el.dataset.update = r0;
    if (colKey === 'story')  el.dataset.story  = r0;
    if (colKey === 'exp') {
      el.style.width = '18px';
      el.style.justifySelf = 'end';
      el.style.zIndex = '30';
    }
    if (colKey === 'camp' && shiftedCamp.has(row)) {
      el.style.width = '75%';
      el.style.justifySelf = 'end';
      el.style.zIndex = '25';
    }

    if (kind === '총력전' || kind === '제약해제결전' || kind === '종합전술시험') {
      const ac = ARMOR_COLORS[row['속성3']];
      if (ac) {
        el.style.background = ac.bg;
        el.style.borderColor = ac.border;
        el.style.borderLeftColor = ac.accent;
      }
    }

    if (kind === '대결전') {
      const a3 = row['속성3'] || '';
      if (a3.length === 1) {
        const ac = ARMOR_COLORS[a3];
        if (ac) {
          el.style.background = ac.bg;
          el.style.borderColor = ac.border;
          el.style.borderLeftColor = ac.accent;
        }
      } else if (a3.length > 1) {
        el.style.background = '#fff7ed';
        el.style.borderColor = '#fed7aa';
        el.style.borderLeftColor = '#ea580c';
      }
    }

    if (kind === '캠페인') {
      const text = `${row['속성1']} ${row['속성2']}`;
      const isMission = /임무|특별의뢰/.test(text);
      const hasThree  = /3/.test(text);
      if (isMission && hasThree) {
        el.style.background = '#fed7aa';
        el.style.borderColor = '#fb923c';
        el.style.borderLeftColor = '#c2410c';
      } else if (isMission) {
        el.style.background = '#ffedd5';
        el.style.borderColor = '#fdba74';
        el.style.borderLeftColor = '#ea580c';
      } else if (hasThree) {
        el.style.background = '#bbf7d0';
        el.style.borderColor = '#4ade80';
        el.style.borderLeftColor = '#15803d';
      }
    }

    el.appendChild(buildBoxContent(row));

    if (dur >= 4 && colKey !== 'story' && colKey !== 'exp') {
      const sd = startDate, ed = addD(endDate, -1);
      const df = document.createElement('div');
      df.className = 'box-dur';
      const dateStr = `${sd.getMonth()+1}/${sd.getDate()} – ${ed.getMonth()+1}/${ed.getDate()}`;
      if (colKey === 'uc') {
        df.textContent = `${dateStr} (${dur}일)`;
      } else {
        df.innerHTML = `${dateStr}<br>(${dur}일)`;
      }
      el.appendChild(df);
    }

    sched.appendChild(el);
  });

  // Resize update cards to fit their content
  requestAnimationFrame(() => {
    sched.querySelectorAll('[data-update]').forEach(el => {
      const r0 = parseInt(el.dataset.update);
      const needed = Math.ceil(el.scrollHeight / DAY_H);
      if (needed > 0) el.style.gridRow = `${r0}/${r0 + needed}`;
    });

    // Resize story cards to fit rendered text height
    sched.querySelectorAll('[data-story]').forEach(el => {
      const r0 = parseInt(el.dataset.story);
      const titleEl = el.querySelector('.box-title');
      if (!titleEl) return;
      let maxH = 0;
      titleEl.childNodes.forEach(node => {
        if (node.nodeType !== Node.TEXT_NODE || !node.textContent.trim()) return;
        const range = document.createRange();
        range.selectNode(node);
        const rect = range.getBoundingClientRect();
        if (rect.height > maxH) maxH = rect.height;
      });
      if (maxH === 0) maxH = titleEl.textContent.length * 17;
      const padPx = parseFloat(getComputedStyle(el).paddingTop) + parseFloat(getComputedStyle(el).paddingBottom);
      const textRows  = Math.max(3, Math.ceil((maxH + padPx) / DAY_H));
      const fadeRows  = 2;
      const totalRows = textRows + fadeRows;
      const gradPct   = Math.round(textRows / totalRows * 100);
      el.style.gridRow = `${r0}/${r0 + totalRows}`;
      el.style.webkitMaskImage = `linear-gradient(to bottom, black ${gradPct}%, transparent)`;
      el.style.maskImage        = `linear-gradient(to bottom, black ${gradPct}%, transparent)`;
    });
  });

  // Scroll to top of earliest active card
  requestAnimationFrame(() => {
    const cal = document.getElementById('cal');
    const activeStarts = entries
      .filter(r => {
        const s = pd(r['한섭시작일자']);
        let e   = pd(r['한섭종료일자']);
        if (!e) e = addD(s, 3);
        return s && e && s <= todayDate && todayDate < e;
      })
      .map(r => pd(r['한섭시작일자']));
    const targetDate = activeStarts.length > 0
      ? new Date(Math.min(...activeStarts))
      : todayDate;
    cal.scrollTop = Math.max(0, (toRow(targetDate) - (HDR + 1)) * DAY_H);
  });
}

// ── Init ──────────────────────────────────────────────────────────────────────

async function init() {
  const loading = document.getElementById('loading');
  const sched   = document.getElementById('sched');
  try {
    const rows = await loadRows();
    if (!rows.length) {
      loading.textContent = '데이터를 불러오지 못했습니다.';
      return;
    }
    loading.style.display = 'none';
    sched.style.display = '';
    render(rows);
  } catch(e) {
    loading.textContent = `로드 실패: ${e.message}`;
  }
}

document.getElementById('btnToday').addEventListener('click', () => {
  const cal = document.getElementById('cal');
  const el  = document.getElementById('_today');
  if (!el) return;
  cal.scrollTop = Math.max(0, (parseInt(el.style.gridRow) - (HDR + 1)) * DAY_H);
});

init();
</script>
