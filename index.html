<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>블루아카 한섭 일정</title>
  <style>
    :root {
      --border:    #c8d3e0;
      --border-lt: #e2eaf3;
      --muted:     #94a3b8;
      --text:      #1e293b;
      --page-bg:   #ffffff;
      --date-bg:   #f4f7fb;
      --outer-bg:  #dde3ec;
      --day-h:     26px;
      --week-band: rgba(0,0,0,0.035);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --border:    #2a3a50;
        --border-lt: #1a2636;
        --muted:     #5a7090;
        --text:      #dde6f0;
        --page-bg:   #0f172a;
        --date-bg:   #162035;
        --outer-bg:  #080e1a;
        --week-band: rgba(255,255,255,0.04);
      }
    }
    :root[data-theme="dark"] {
      --border:    #2a3a50;
      --border-lt: #1a2636;
      --muted:     #5a7090;
      --text:      #dde6f0;
      --page-bg:   #0f172a;
      --date-bg:   #162035;
      --outer-bg:  #080e1a;
      --week-band: rgba(255,255,255,0.04);
    }
    :root[data-theme="light"] {
      --week-band: rgba(0,0,0,0.035);
    }
    :root[data-theme="light"] {
      --border:    #c8d3e0;
      --border-lt: #e2eaf3;
      --muted:     #94a3b8;
      --text:      #1e293b;
      --page-bg:   #ffffff;
      --date-bg:   #f4f7fb;
      --outer-bg:  #dde3ec;
    }

    @media (min-width: 768px) {
      :root { --day-h: 34px; }
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--outer-bg); }

    .page {
      max-width: 900px;
      margin: 0 auto;
      height: 100dvh;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--page-bg);
      box-shadow: 0 0 24px rgba(0,0,0,0.15);
    }

    header {
      flex-shrink: 0;
      height: 46px;
      padding: 0 0.9rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      background: var(--page-bg);
    }
    header h1 {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .btn {
      font-size: 0.8rem; font-weight: 700;
      padding: 0.27rem 0.75rem;
      border-radius: 9999px;
      border: none; cursor: pointer;
      background: #2563eb; color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .cal {
      flex: 1;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
    }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--muted);
      font-size: 0.85rem;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .sched {
      display: grid;
      grid-auto-rows: var(--day-h);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: var(--text);
    }

    /* ── Date column ── */
    .dc-bg {
      grid-column: 1;
      position: sticky; left: 0; z-index: 55;
      background: var(--date-bg);
      border-right: 1.5px solid var(--border);
    }
    .dc-label {
      grid-column: 1;
      position: sticky; left: 0; z-index: 60;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem; font-weight: 700;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      writing-mode: vertical-rl;
      text-orientation: mixed;
      overflow: visible;
      letter-spacing: 0.02em;
    }

    /* ── Lane area ── */
    .lane-area-end {
      z-index: 1;
      pointer-events: none;
    }

    /* ── Lane connector ── */
    .lane-connector {
      position: relative;
      align-self: center;
      height: 3px;
      overflow: visible;
      pointer-events: none;
      z-index: 5;
    }
    .lane-connector.is-past { opacity: 0.32; }
    .lane-connector.has-curve::before {
      content: '';
      position: absolute;
      left: calc(-1 * var(--day-h) / 2 - 2px);
      bottom: 0;
      width: calc(var(--day-h) / 2 + 2px);
      height: calc(var(--day-h) / 2 + 1.5px);
      border-left: 3px solid var(--lc);
      border-bottom: 3px solid var(--lc);
      border-bottom-left-radius: calc(var(--day-h) / 2);
    }
    .lane-connector.has-curve.is-dashed::before {
      border-left-style: double;
      border-bottom-style: double;
    }

    /* ── Content boxes ── */
    .content-box {
      margin: 2px 4px 2px 0;
      border-radius: 0.35rem;
      padding: 0.15rem 0.45rem;
      overflow: hidden;
      border-left: 3px solid transparent;
      position: relative;
      z-index: 10;
    }
    .content-box.is-past { opacity: 0.32; }
    .content-item {
      font-size: 0.65rem;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.35;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    @media (min-width: 768px) {
      .content-item { font-size: 0.8rem; }
    }

    /* ── Today line ── */
    .today-line {
      grid-column: 1 / -1;
      border-top: 1px solid #ef4444;
      pointer-events: none;
      align-self: start;
    }

    /* ── Branch lines ── */
    .bar-line {
      justify-self: start;
      margin-left: 6px;
      width: 3px;
      position: relative;
      z-index: 20;
      cursor: default;
    }
    .bar-line.is-past { opacity: 0.28; }
    .bar-line::before {
      content: '';
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      top: calc((var(--day-h) - 10px) / 2);
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--lc, #888);
      box-shadow: 0 0 0 2px var(--page-bg);
      mask: none;
      -webkit-mask: none;
    }
    .bar-line::after  { display: none; }
    .bar-line.no-start-dot::before { display: none; }
    .bar-line.is-dashed::before { display: none; }
    .junction-dot, .end-dot {
      justify-self: start;
      margin-left: 6px;
      width: 4px;
      position: relative;
      z-index: 25;
      pointer-events: none;
    }
    .junction-dot::before, .end-dot::before {
      content: '';
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      top: calc((var(--day-h) - 10px) / 2);
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--lc, #888);
      box-shadow: 0 0 0 2px var(--page-bg);
    }
    .junction-dot.is-past, .end-dot.is-past { opacity: 0.28; }
    .junction-dot.dashed-start::before {
      top: calc(var(--day-h) / 2 - 2px);
      width: 4px; height: 4px;
      box-shadow: 0 0 0 2px var(--page-bg), 0 0 0 4px var(--lc, #888), 0 0 0 6px var(--page-bg);
    }
    /* ── Chain highlight ── */
    .sched.hl-active .bar-line:not(.hl-selected),
    .sched.hl-active .lane-connector:not(.hl-selected),
    .sched.hl-active .content-box:not(.hl-selected),
    .sched.hl-active .junction-dot:not(.hl-selected),
    .sched.hl-active .end-dot:not(.hl-selected) { opacity: 0.2; }
    .sched.hl-active .bar-line.hl-selected,
    .sched.hl-active .lane-connector.hl-selected,
    .sched.hl-active .content-box.hl-selected,
    .sched.hl-active .junction-dot.hl-selected,
    .sched.hl-active .end-dot.hl-selected { opacity: 1; }
    .content-box { cursor: pointer; }
    .bar-label {
      justify-self: start;
      align-self: stretch;
      margin-left: 3px;
      width: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: visible;
      pointer-events: none;
      position: relative;
      z-index: 22;
    }
    .bar-label > span {
      display: block;
      white-space: nowrap;
      font-size: 0.6rem;
      font-weight: 600;
      color: var(--lc);
      transform: rotate(90deg);
      transform-origin: center center;
      background: rgba(255,255,255,0.72);
      padding: 1px 3px;
      border-radius: 2px;
    }
    .bar-label.is-past { opacity: 0.32; }
  </style>
</head>
<body>
<div class="page">
  <header>
    <h1>블루아카 한섭 일정</h1>
    <button class="btn" id="btnToday">▲ 오늘로</button>
  </header>
  <div class="cal" id="cal">
    <div class="loading" id="loading">로딩 중…</div>
    <div class="sched" id="sched" style="display:none"></div>
  </div>
</div>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRE_g5vT44r3MXOoMdD_4MjeT0tf4luvbt_7AGUHx4cS0cx0aWFFAYlUiRAx5oAUB_gtFst5Ncy8pkc/pub?output=csv';

const LANE_COLORS = ['#E6194B', '#3CB44B', '#FFE119', '#4363D8', '#F58231', '#911EB4', '#42D4F4'];

// ── Date utilities ─────────────────────────────────────────────────────────────

const MIN_DATE = new Date(2021, 0, 1);

function pd(s) {
  if (!s) return null;
  s = String(s).trim().replace(/﻿/g, '');
  if (!s) return null;
  let m, d, y, result;
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) {
    [y,m,d] = s.split('-').map(Number);
    result = new Date(y, m-1, d);
  } else if (/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(s)) {
    [m,d,y] = s.split('/').map(Number);
    result = new Date(y, m-1, d);
  } else if (/^\d{4}\/\d{1,2}\/\d{1,2}$/.test(s)) {
    [y,m,d] = s.split('/').map(Number);
    result = new Date(y, m-1, d);
  } else {
    const koMatch = s.match(/^(\d{4})\.\s*(\d{1,2})\.\s*(\d{1,2})\.?\s*(?:\([^)]*\))?$/);
    if (koMatch) {
      [, y, m, d] = koMatch.map(Number);
      result = new Date(y, m-1, d);
    } else if (/^\d{1,2}\/\d{1,2}$/.test(s)) {
      [m,d] = s.split('/').map(Number);
      y = new Date().getFullYear();
      const t = new Date(y, m-1, d);
      if (t < addD(new Date(), -180)) y++;
      result = new Date(y, m-1, d);
    }
  }
  if (!result || result < MIN_DATE) return null;
  return result;
}

function addD(d, n)  { const r = new Date(d); r.setDate(r.getDate()+n); return r; }
function diffD(a, b) { return Math.round((a - b) / 86400000); }
function today0()    { const d = new Date(); d.setHours(0,0,0,0); return d; }
function fmtMD(d)    { return `${d.getMonth()+1}/${d.getDate()}`; }

// ── CSV parsing ────────────────────────────────────────────────────────────────

function parseCSVLine(line) {
  const res = [];
  let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { inQ = !inQ; continue; }
    if (c === ',' && !inQ) { res.push(cur); cur = ''; continue; }
    cur += c;
  }
  res.push(cur);
  return res;
}

async function loadRows() {
  const noCache = new URLSearchParams(location.search).has('nocache');
  const url = noCache ? `${CSV_URL}&_t=${Date.now()}` : CSV_URL;
  const res = await fetch(url, noCache ? { cache: 'no-store' } : {});
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const text = await res.text();
  const clean = text.replace(/^﻿/, '');
  const lines = clean.split('\n').filter(l => l.trim());
  if (lines.length < 2) return [];
  const headers = parseCSVLine(lines[0]).map(h => h.trim().replace(/^﻿/, ''));
  return lines.slice(1)
    .map(line => {
      const vals = parseCSVLine(line);
      const row = {};
      headers.forEach((h, i) => row[h] = (vals[i] || '').trim());
      return row;
    })
    .filter(r => r['종류'] && pd(r['한섭시작일자']));
}

// ── Merge same-range pickups into one row ──────────────────────────────────────

function groupPickups(rows) {
  const out  = [];
  const seen = {};
  rows.forEach(row => {
    if (row['종류'] !== '픽업') { out.push(row); return; }
    const key   = `${row['한섭시작일자']}|${row['한섭종료일자']}`;
    const type3 = row['속성3'] || '';
    const type4 = row['속성4'] || '';
    const chars = [row['속성1'], row['속성2']].filter(Boolean)
                    .map(c => ({ name: c, type: type3, rerun: type4 }));
    if (seen[key]) {
      chars.forEach(c => {
        if (!seen[key]._chars.find(x => x.name === c.name)) seen[key]._chars.push(c);
      });
    } else {
      const g = { ...row, _chars: chars };
      seen[key] = g;
      out.push(g);
    }
  });
  return out;
}

// ── Group all rows by (KR start, KR end) date range ───────────────────────────

function groupByRange(rows) {
  const map = new Map();
  rows.forEach(row => {
    const s = row['한섭시작일자'];
    const e = row['한섭종료일자'];
    if (!s) return;
    const startDate = pd(s);
    if (!startDate) return;
    let endDate = pd(e);
    const hasRealEnd = !!endDate;
    if (!endDate) {
      const kind = row['종류'];
      endDate = addD(startDate, (kind === '메인스토리' || kind === '업데이트') ? 3 : 7);
    }
    const isoS = startDate.toISOString().slice(0,10);
    const isoE = endDate.toISOString().slice(0,10);
    // No-end items: group by start date only (synthetic end varies by kind, irrelevant)
    // Real-end items: group by start|end to avoid merging with no-end items of same range
    const key = hasRealEnd ? `${isoS}|${isoE}|1` : `${isoS}|0`;
    if (!map.has(key)) map.set(key, { start: startDate, end: endDate, rows: [], hasRealEnd });
    const grp = map.get(key);
    // Keep the longest synthetic window across no-end rows in the same group
    if (!hasRealEnd && endDate > grp.end) grp.end = endDate;
    grp.rows.push(row);
  });
  return [...map.values()].sort((a, b) => a.start - b.start || b.end - a.end);
}

// ── Greedy lane assignment ─────────────────────────────────────────────────────

function assignLanes(groups) {
  // Lane 0: items without a real end date (fade-out style)
  // Lanes 1..N: greedy interval scheduling for items with real end dates
  // Lane N+1 (rightmost): JFD (제약해제결전) forced here
  const isJFD = g => g.rows.some(r => r['종류'] === '제약해제결전');

  const laneEnds = [new Date(0)]; // lane 0 reserved; never used by greedy

  // Pass 1: greedy for non-lane0, non-JFD groups
  groups.forEach(g => {
    if (!g.hasRealEnd) { g.lane = 0; return; }
    if (isJFD(g)) return;
    let lane = laneEnds.findIndex((e, i) => i >= 1 && e <= g.start);
    if (lane === -1) lane = laneEnds.length;
    laneEnds[lane] = g.end;
    g.lane = lane;
  });

  // Pass 2: JFD fixed to rightmost lane (one beyond greedy max)
  const jfdLane = laneEnds.length;
  groups.forEach(g => {
    if (g.hasRealEnd && isJFD(g)) g.lane = jfdLane;
  });

  const numLanes = Math.max(4, jfdLane + 1);
  return { groups, numLanes };
}

// ── Lane color helpers ─────────────────────────────────────────────────────────

function laneColor(lane) {
  return LANE_COLORS[lane % LANE_COLORS.length];
}

function laneColorBg(lc) {
  const r = parseInt(lc.slice(1, 3), 16);
  const g = parseInt(lc.slice(3, 5), 16);
  const b = parseInt(lc.slice(5, 7), 16);
  return `rgba(${r},${g},${b},0.10)`;
}

// ── Content item text (compact, single line per row) ──────────────────────────

function makeItemText(row) {
  const k  = row['종류'];
  const a1 = (row['속성1'] || '').trim();
  const a2 = (row['속성2'] || '').trim();
  const a3 = (row['속성3'] || '').trim();
  const a4 = (row['속성4'] || '').trim();
  const a5 = (row['속성5'] || '').trim();

  if (k === '픽업') {
    const chars = row._chars || [{ name: a1, type: a3, rerun: a4 }];
    const parts = chars.map(c => {
      let s = c.name;
      if (c.type === '한정' || c.type === '페스') s += `(${c.type})`;
      if (c.rerun) s += ' ↩';
      return s;
    });
    return `[픽업] ${parts.join(' · ')}`;
  }
  if (k === '이벤트') {
    const sub = (a2 && a2 !== '신규') ? ` (${a2})` : '';
    return `[이벤트] ${a1}${sub}`;
  }
  if (k === '메인스토리') return `[스토리] ${a1}`;
  if (k === '총력전') {
    const detail = [a3, a5].filter(Boolean).join(' ');
    return `[총력전] ${a1}${detail ? ' ' + detail : ''}`;
  }
  if (k === '대결전') {
    const armor = (a3 && a4) ? `${a3}/${a4}` : a3;
    const detail = [a2, armor, a5].filter(Boolean).join(' ');
    return `[대결전] ${a1}${detail ? ' ' + detail : ''}`;
  }
  if (k === '제약해제결전') return `[제약해제] ${a1}${a3 ? ' ' + a3 : ''}`;
  if (k === '종합전술시험') return `[시험] ${a1}`;
  if (k === '캠페인') return `[캠페인] ${[a1, a2].filter(Boolean).join(' ')}`;
  if (k === '업데이트') return `[업데이트] ${a1}`;
  return `[${k}] ${a1}`;
}

// ── Tooltip (shown on hover) ───────────────────────────────────────────────────

function buildTooltip(row) {
  const kind = row['종류'];
  const a1 = row['속성1'] || '';
  const a3 = row['속성3'] || '', a4 = row['속성4'] || '', a5 = row['속성5'] || '';

  let summary = '';
  if (kind === '픽업') {
    const chars = (row._chars || []).map(c => c.name).filter(Boolean);
    summary = chars.length ? chars.join(', ') : a1;
  } else if (kind === '이벤트' || kind === '메인스토리') {
    summary = a1;
  } else {
    const detail = [a1, a3 && a4 ? `${a3}/${a4}` : a3, a5].filter(Boolean).join(' · ');
    summary = [kind, detail].filter(Boolean).join(' ');
  }

  const fmt = s => s ? s.replace(/-/g, '/') : null;
  const lines = [];
  if (summary) lines.push(summary);
  const jpS = fmt(row['일섭시작일자']), jpE = fmt(row['일섭종료일자']);
  const krS = fmt(row['한섭시작일자']), krE = fmt(row['한섭종료일자']);
  if (jpS) lines.push(`JP: ${jpS}~${jpE || '?'}`);
  if (krS) lines.push(`KR: ${krS}~${krE || '?'}`);
  return lines.join('\n');
}

// ── Render ─────────────────────────────────────────────────────────────────────

function render(rows) {
  const DAY_H = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--day-h')) || 26;
  const sched = document.getElementById('sched');
  sched.innerHTML = '';

  const todayDate = today0();

  const { groups, numLanes } = assignLanes(groupByRange(groupPickups(rows)));
  if (!groups.length) return;

  // Extend lane 0 synthetic ends by fade length (must happen before grid bounds)
  const lane0s = groups.filter(g => !g.hasRealEnd).sort((a, b) => a.start - b.start);
  lane0s.forEach((g, i) => {
    const next = lane0s.find((h, j) => j > i && h.start > g.start);
    const gapToNext = next ? Math.max(0, diffD(next.start, g.end)) : 14;
    if (gapToNext > 0) {
      // Gap exists: extend bar toward next group and fade through the gap (max 14 days)
      const fadeDays = Math.min(14, gapToNext);
      g._fadePx = fadeDays * DAY_H;
      g.end = addD(g.end, fadeDays);
    } else {
      // Next group starts at/before synthetic end: fade within the existing window (last 40%)
      const barDays = diffD(g.end, g.start);
      g._fadePx = Math.max(2, Math.round(barDays * 0.4)) * DAY_H;
      // g.end stays at synthetic end — bar does not extend past next group's start
    }
  });

  // CSV end dates are inclusive; endR converts to exclusive for grid/past comparisons
  const endR = g => g.hasRealEnd ? addD(g.end, 1) : g.end;

  // Grid bounds
  const allDates  = groups.flatMap(g => [g.start, endR(g)]);
  const gridStart = addD(new Date(Math.min(...allDates)), -3);
  const viewportDays = Math.ceil(document.getElementById('cal').clientHeight / DAY_H);
  let gridEnd = addD(new Date(Math.max(...allDates)), 7);
  const minEnd = addD(todayDate, viewportDays + 7);
  if (gridEnd < minEnd) gridEnd = minEnd;
  const totalDays = diffD(gridEnd, gridStart) + 1;
  const ROWS = totalDays + 2;

  // contentCol = column after all lane columns (1 date + numLanes lanes + 1 content)
  const contentCol = numLanes + 2;

  sched.style.gridTemplateColumns = `20px repeat(${numLanes}, 16px) 1fr`;
  sched.style.gridAutoRows = `${DAY_H}px`;
  sched.style.minHeight = `${totalDays * DAY_H}px`;

  const toRow    = d => diffD(d, gridStart) + 1;
  const todayRow = toRow(todayDate);

  // Handoff detection: consecutive same-lane, same-type groups with touching dates → seamless bar

  const byLane = {};
  groups.forEach(g => (byLane[g.lane] ??= []).push(g));
  const noEndDot    = new Set();
  const handoffStart = new Set();
  Object.values(byLane).forEach(laneGrps => {
    laneGrps.sort((a, b) => a.start - b.start);
    for (let i = 0; i < laneGrps.length - 1; i++) {
      if (laneGrps[i].hasRealEnd &&
          laneGrps[i].end.getTime() === laneGrps[i+1].start.getTime()) {
        noEndDot.add(laneGrps[i]);
        handoffStart.add(laneGrps[i+1]);
      }
    }
  });

  // isDashed + chain ID assignment
  let nextChainId = 0;
  const gChain = new Map();
  Object.values(byLane).forEach(laneGrps => {
    laneGrps.sort((a, b) => a.start - b.start);
    let chainCount = 0;
    let currentChainId = -1;
    laneGrps.forEach(g => {
      const inChain = noEndDot.has(g) || handoffStart.has(g);
      if (!inChain) {
        g.isDashed = false;
        chainCount = 0;
        gChain.set(g, nextChainId++);
        currentChainId = -1;
      } else {
        if (!handoffStart.has(g)) currentChainId = nextChainId++;
        gChain.set(g, currentChainId);
        g.isDashed = chainCount % 2 === 1;
        chainCount++;
        if (handoffStart.has(g) && !noEndDot.has(g)) chainCount = 0;
      }
    });
  });

  // Week bands: alternate background every Tuesday (odd bands get --week-band tint)
  {
    let tue = new Date(gridStart);
    while (tue.getDay() !== 2) tue = addD(tue, 1);
    let band = 0;
    while (tue < gridEnd) {
      const nextTue = addD(tue, 7);
      const r0 = Math.max(1, toRow(tue));
      const r1 = Math.min(ROWS, toRow(nextTue));
      if (r0 < r1 && band % 2 === 1) {
        const wb = document.createElement('div');
        wb.style.cssText = `grid-column:1/-1;grid-row:${r0}/${r1};background:var(--week-band);pointer-events:none;`;
        sched.appendChild(wb);
      }
      tue = nextTue;
      band++;
    }
  }

  // Lane area placeholder (for z-ordering)
  const laneEnd = document.createElement('div');
  laneEnd.className = 'lane-area-end';
  laneEnd.style.cssText = `grid-column:2/${contentCol};grid-row:1/${ROWS};`;
  sched.appendChild(laneEnd);

  // Date column background (sticky)
  const dcBg = document.createElement('div');
  dcBg.className = 'dc-bg';
  dcBg.style.cssText = `grid-row:1/${ROWS};`;
  sched.appendChild(dcBg);

  // Date labels only at dot positions (no label for synthetic end dates)
  const labelMap = new Map();
  groups.forEach(g => {
    labelMap.set(g.start.getTime(), g.start);
    if (g.hasRealEnd && !noEndDot.has(g)) {
      labelMap.set(g.end.getTime(), g.end);
    }
  });
  let prevLabelRow = -Infinity;
  [...labelMap.values()].sort((a, b) => a - b).forEach(date => {
    const row = toRow(date);
    if (row - prevLabelRow < 2) return; // skip if previous label was on adjacent row
    prevLabelRow = row;
    const lbl = document.createElement('div');
    lbl.className = 'dc-label';
    lbl.style.cssText = `grid-row:${row};`;
    lbl.textContent = fmtMD(date);
    sched.appendChild(lbl);
  });

  // Today marker
  if (todayRow >= 1 && todayRow < ROWS) {
    const tl = document.createElement('div');
    tl.id = '_today';
    tl.className = 'today-line';
    tl.style.cssText = `grid-row:${todayRow};`;
    sched.appendChild(tl);
  }

  // Branch lines
  groups.forEach(g => {
    const r0 = toRow(g.start);
    const r1 = toRow(endR(g));
    if (r0 >= r1) return;

    const col    = g.lane + 2;
    const lc     = laneColor(g.lane);
    const isPast = endR(g) <= todayDate;

    const el = document.createElement('div');
    el.className = 'bar-line' +
      (isPast ? ' is-past' : '') +
      (g.isDashed ? ' is-dashed' : '') +
      (handoffStart.has(g) ? ' no-start-dot' : '');
    el.style.cssText = `grid-column:${col};grid-row:${r0}/${r1};`;
    el.style.setProperty('--lc', lc);

    const half   = `${DAY_H / 2}px`;
    const capPx  = `${(DAY_H - 10) / 2}px`;
    // handoffStart: bar begins at mid-row; noEndDot: bar ends at mid-row
    const clipTop = handoffStart.has(g) ? half : capPx;
    if (!g.hasRealEnd) {
      const fadePx = g._fadePx ?? (14 * DAY_H);
      el.style.background =
        `linear-gradient(to bottom, transparent ${clipTop}, ${lc} ${clipTop}, ${lc} calc(100% - ${fadePx}px), transparent 100%)`;
    } else {
      const clipBot = noEndDot.has(g) ? half : capPx;
      el.style.background =
        `linear-gradient(to bottom, transparent ${clipTop}, ${lc} ${clipTop}, ${lc} calc(100% - ${clipBot}), transparent calc(100% - ${clipBot}))`;
    }
    if (g.isDashed) {
      el.style.maskImage =
        'linear-gradient(to right, black 1px, transparent 1px, transparent 2px, black 2px)';
    }

    el.dataset.chain = gChain.get(g);
    el.title = g.rows.map(r => buildTooltip(r)).join('\n---\n');
    sched.appendChild(el);
  });

  // Junction dots: standalone elements at handoff points, unaffected by bar mask
  // dashed-start: solid→dashed transition → double-ring style
  noEndDot.forEach(g => {
    const jRow = toRow(g.end); // shared row: last row of A = first row of B
    const lc   = laneColor(g.lane);
    const dot  = document.createElement('div');
    dot.className = 'junction-dot' +
      (!g.isDashed ? ' dashed-start' : '') +
      (endR(g) <= todayDate ? ' is-past' : '');
    dot.dataset.chain = gChain.get(g);
    dot.style.cssText = `grid-column:${g.lane + 2};grid-row:${jRow};`;
    dot.style.setProperty('--lc', lc);
    sched.appendChild(dot);
  });

  // End dots: separate elements for bars that terminate (not in handoff chain)
  groups.forEach(g => {
    if (!g.hasRealEnd || noEndDot.has(g)) return;
    const eRow = toRow(g.end);
    const lc   = laneColor(g.lane);
    const dot  = document.createElement('div');
    dot.className = 'end-dot' + (endR(g) <= todayDate ? ' is-past' : '');
    dot.dataset.chain = gChain.get(g);
    dot.style.cssText = `grid-column:${g.lane + 2};grid-row:${eRow};`;
    dot.style.setProperty('--lc', lc);
    sched.appendChild(dot);
  });

  const isExpCampaign = g => g.rows.every(r => r['종류'] === '캠페인' && (r['속성1'] || '').trim() === '경험치');

  // Greedy packing for content boxes: lane 0 (no real end) first, then longer duration
  // Skip 경험치 groups — they show inline on the bar instead of a content-box
  const contentOrder = [...groups].filter(g => !isExpCampaign(g)).sort((a, b) =>
    a.start - b.start ||
    (a.lane === 0 ? 0 : 1) - (b.lane === 0 ? 0 : 1) ||
    b.end - a.end
  );
  const occupied = [];

  function findSlot(preferred, height) {
    let row = preferred;
    for (const [os, oe] of occupied) {
      if (row >= oe) continue;
      if (row + height <= os) break;
      row = oe;
    }
    return row;
  }

  const placements = new Map();
  contentOrder.forEach(g => {
    const height = g.rows.length === 1 ? 1 : Math.ceil(g.rows.length / 3) + 1;
    const start  = findSlot(toRow(g.start), height);
    const end    = start + height;
    occupied.push([start, end]);
    occupied.sort((a, b) => a[0] - b[0]);
    placements.set(g, { start, end });
  });

  // Render connectors + content boxes
  groups.forEach(g => {
    const lc      = laneColor(g.lane);
    const isPast  = endR(g) <= todayDate;
    const laneCol = g.lane + 2;

    // 경험치 campaign: show rotated text label on the bar, skip connector + content-box
    if (isExpCampaign(g)) {
      const lbl = document.createElement('div');
      lbl.className = 'bar-label' + (isPast ? ' is-past' : '');
      lbl.dataset.chain = gChain.get(g);
      lbl.style.cssText = `grid-column:${laneCol};grid-row:${toRow(g.start)}/${toRow(endR(g))};`;
      lbl.style.setProperty('--lc', lc);
      const sp = document.createElement('span');
      sp.textContent = '경험치';
      lbl.appendChild(sp);
      sched.appendChild(lbl);
      return;
    }

    const { start: r0, end: r1 } = placements.get(g);
    const bg      = laneColorBg(lc);

    // Horizontal connector from lane bar to content column boundary
    const barStartRow = toRow(g.start);
    const hasCurve = r0 > barStartRow;
    const conn = document.createElement('div');
    conn.className = 'lane-connector' +
      (isPast ? ' is-past' : '') +
      (g.isDashed ? ' is-dashed' : '') +
      (hasCurve ? ' has-curve' : '');
    const connBg = g.isDashed
      ? `linear-gradient(to bottom, ${lc} 1px, transparent 1px, transparent 2px, ${lc} 2px)`
      : lc;
    const ml = hasCurve ? 'calc(var(--day-h) / 2 + 8px)' : '8px';
    conn.dataset.chain = gChain.get(g);
    conn.style.cssText =
      `grid-column:${laneCol}/${contentCol};grid-row:${r0};margin-left:${ml};background:${connBg};`;
    conn.style.setProperty('--lc', lc);
    sched.appendChild(conn);

    // Content box
    const box = document.createElement('div');
    box.className = 'content-box' + (isPast ? ' is-past' : '');
    box.dataset.chain = gChain.get(g);
    box.style.cssText =
      `grid-column:${contentCol};grid-row:${r0}/${r1};` +
      `background-color:var(--page-bg);background-image:linear-gradient(${bg},${bg});` +
      (g.isDashed
        ? `border-left-color:${lc};border-left-style:double;`
        : `border-left-color:${lc};border-left-style:solid;`);

    // Group rows by 종류 (preserving first-occurrence order), merge same-kind into one line
    const kindRows = new Map();
    g.rows.forEach(row => {
      const k = row['종류'];
      if (!kindRows.has(k)) kindRows.set(k, []);
      kindRows.get(k).push(row);
    });
    kindRows.forEach((rows, k) => {
      const noMerge = k === '메인스토리';
      if (noMerge || rows.length === 1) {
        rows.forEach(row => {
          const item = document.createElement('div');
          item.className = 'content-item';
          item.textContent = makeItemText(row);
          item.title = buildTooltip(row);
          box.appendChild(item);
        });
      } else {
        const item = document.createElement('div');
        item.className = 'content-item';
        const firstText = makeItemText(rows[0]);
        const prefix = firstText.match(/^\[.*?\]/)?.[0] ?? '';
        item.textContent = prefix + ' ' + rows.map(r => makeItemText(r).replace(/^\[.*?\]\s*/, '')).join(' / ');
        item.title = rows.map(r => buildTooltip(r)).join('\n---\n');
        box.appendChild(item);
      }
    });

    sched.appendChild(box);
  });

  // Click-to-highlight: clicking a card highlights its chain
  sched.addEventListener('click', e => {
    const box = e.target.closest('.content-box');
    const alreadySelected = box && box.classList.contains('hl-selected');
    sched.querySelectorAll('.hl-selected').forEach(el => el.classList.remove('hl-selected'));
    sched.classList.remove('hl-active');
    if (box && !alreadySelected) {
      const cid = box.dataset.chain;
      sched.querySelectorAll(`[data-chain="${cid}"]`).forEach(el => el.classList.add('hl-selected'));
      sched.classList.add('hl-active');
    }
  }, { capture: false });

  // Scroll to today / earliest active group
  requestAnimationFrame(() => {
    const cal = document.getElementById('cal');
    const activeStarts = groups
      .filter(g => g.start <= todayDate && todayDate < g.end)
      .map(g => g.start);
    const targetDate = activeStarts.length
      ? new Date(Math.min(...activeStarts))
      : todayDate;
    cal.scrollTop = Math.max(0, diffD(targetDate, gridStart) * DAY_H - 80);
  });
}

// ── Init ───────────────────────────────────────────────────────────────────────

let _cachedRows = null;

function rerender() {
  if (_cachedRows) render(_cachedRows);
}

async function init() {
  const loading = document.getElementById('loading');
  const sched   = document.getElementById('sched');
  try {
    const rows = await loadRows();
    if (!rows.length) {
      loading.textContent = '데이터를 불러오지 못했습니다.';
      return;
    }
    _cachedRows = rows;
    loading.style.display = 'none';
    sched.style.display = '';
    render(rows);

    setInterval(rerender, 10 * 60 * 1000);
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) rerender();
    });
  } catch(e) {
    loading.textContent = `로드 실패: ${e.message}`;
  }
}

document.getElementById('btnToday').addEventListener('click', () => {
  const cal  = document.getElementById('cal');
  const el   = document.getElementById('_today');
  if (!el) return;
  const dayH = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--day-h')) || 26;
  const row  = parseInt(el.style.gridRow) - 1;
  cal.scrollTop = Math.max(0, row * dayH - 80);
});

// Re-render when crossing the mobile/PC breakpoint (768px)
let _prevMobile = window.innerWidth < 768;
window.addEventListener('resize', () => {
  const mobile = window.innerWidth < 768;
  if (mobile !== _prevMobile) { _prevMobile = mobile; rerender(); }
});

init();
</script>
</body>
